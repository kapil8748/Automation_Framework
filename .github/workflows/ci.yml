name: Test Execution

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:


  test1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Runs your default suites, previous custom tasks, and your two new TestNG tasks
      - name: Run All Test Suites
        run: |
          ./gradlew test --info
          
        continue-on-error: true # Ensures reporting runs even if tests fail

      # Wildcard path captures reports from all custom tasks
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-test-reports


          path: build/reports/tests/


