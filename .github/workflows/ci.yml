        with:
          distribution: 'corretto'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run All Test Suites
        run: ./gradlew runSpecificJunit --info
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test2-reports
          path: build/reports/

