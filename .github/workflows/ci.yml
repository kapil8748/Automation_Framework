name: Test Execution

on:
  schedule:
    - cron: '30 9 * * 1,2,5,6'
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run Case 1
        run: ./gradlew test --info
      - name: Upload Raw Data 1
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-test1
          path: build/test-results/test # REMOVED trailing slash to upload the folder container

  test2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run Case 2
        run: ./gradlew runSpecificJunitTest --info
      - name: Upload Raw Data 2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-test2
          path: build/test-results/runSpecificJunitTest # REMOVED trailing slash

  test3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run Case 3
        run: ./gradlew runSpecificTestNGTest --info
      - name: Upload Raw Data 3
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-test3
          path: build/test-results/runSpecificTestNGTest # REMOVED trailing slash

  master-report:
    runs-on: ubuntu-latest
    needs: [test1, test2, test3]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        
      # Download into the root parent path "build/test-results"
      # Because the artifacts contain the folder themselves, they extract cleanly into separate folders!
      - name: Download Data 1
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: data-test1
          path: build/test-results
          
      - name: Download Data 2
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: data-test2
          path: build/test-results
          
      - name: Download Data 3
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: data-test3
          path: build/test-results
          
      - name: Compile Unified HTML Report
        run: ./gradlew combinedReport --info
        
      - name: Upload Single Consolidated Report
        uses: actions/upload-artifact@v4
        with:
          name: single-consolidated-report
          path: build/reports/combined-report/

      - name: Check test status for pipeline result
        if: |
          needs.test1.result == 'failure' || 
          needs.test2.result == 'failure' || 
          needs.test3.result == 'failure' ||
          needs.test1.result == 'cancelled' || 
          needs.test2.result == 'cancelled' || 
          needs.test3.result == 'cancelled'
        run: exit 1
