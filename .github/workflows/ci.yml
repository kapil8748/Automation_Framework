name: Test Execution

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-all-tests-and-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # --- RUN CASE 1 ---
      - name: Run Case 1
        id: case1
        continue-on-error: true # Prevents a failing test from stopping the whole job
        run: ./gradlew test --info

      # Simulating the artifact path structure so your 'combinedReport' task can find it locally
      - name: Stage Data 1
        if: always()
        run: |
          if [ -d "build/test-results/test/" ]; then
            mkdir -p build/artifacts/test1
            cp -r build/test-results/test/* build/artifacts/test1/
          fi

      # --- RUN CASE 2 ---
      - name: Run Case 2
        id: case2
        continue-on-error: true
        run: ./gradlew runSpecificJunitTest --info

      - name: Stage Data 2
        if: always()
        run: |
          if [ -d "build/test-results/runSpecificJunitTest/" ]; then
            mkdir -p build/artifacts/test2
            cp -r build/test-results/runSpecificJunitTest/* build/artifacts/test2/
          fi

      # --- RUN CASE 3 ---
      - name: Run Case 3
        id: case3
        continue-on-error: true
        run: ./gradlew runSpecificTestNGTest --info

      - name: Stage Data 3
        if: always()
        run: |
          if [ -d "build/test-results/runSpecificTestNGTest/" ]; then
            mkdir -p build/artifacts/test3
            cp -r build/test-results/runSpecificTestNGTest/* build/artifacts/test3/
          fi

      # --- UNIFIED REPORT GENERATION ---
      - name: Compile Unified HTML Report
        if: always()
        run: ./gradlew combinedReport --info

      # Only uploading the final outcome to GitHub
      - name: Upload Single Consolidated Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: single-consolidated-report
          path: build/reports/combined-report/

      # --- PIPELINE STATUS ENFORCEMENT ---
      # This ensures if any of the test suites failed, the workflow run shows a red "X"
      - name: Determine final workflow status
        if: always()
        run: |
          if [ "${{ steps.case1.outcome }}" = "failure" ] || [ "${{ steps.case2.outcome }}" = "failure" ] || [ "${{ steps.case3.outcome }}" = "failure" ]; then
            echo "One or more test suites failed."
            exit 1
          fi
