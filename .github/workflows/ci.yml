name: Java CI with Gradle and Headed Selenium

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Install Xvfb (Virtual Screen Display Server)
    - name: Install Xvfb and GUI Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxi6 libgconf-2-4

    # Step 3: Set up Java 21 environment
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    # Step 4: Grant execute permission to Gradle wrapper
    - name: Grant Execute Permission to Gradle Wrapper
      run: chmod +x ./gradlew

    # Step 5: Start Xvfb and execute Gradle tests in GUI mode
    - name: Run Tests in GUI Mode (Headed)
      run: |
        xvfb-run --server-args="-screen 0 1920x1080x24" ./gradlew test
      env:
        CI: true

    # Step 6: Upload Test Reports and Screenshots if they exist
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: junit-test-reports
        path: build/reports/tests/test/

