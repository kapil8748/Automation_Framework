name: Test Execution

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # 3:30 AM UTC = 9:00 AM IST (Monday to Saturday)
    - cron: '30 3 * * 1-6'

jobs:
  test1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Case 1
        run: ./gradlew test --info
      - name: Upload Raw Data 1
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-test1
          path: build/test-results/test/
          if-no-files-found: ignore

  test2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Case 2
        run: ./gradlew runSpecificJunitTest --info
      - name: Upload Raw Data 2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-test2
          path: build/test-results/runSpecificJunitTest/
          if-no-files-found: ignore

  test3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Case 3
        run: ./gradlew runSpecificTestNGTest --info
      - name: Upload Raw Data 3
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-test3
          path: build/test-results/runSpecificTestNGTest/
          if-no-files-found: ignore

  master-report:
    runs-on: ubuntu-latest
    needs: [test1, test2, test3]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - uses: gradle/actions/setup-gradle@v4

      - name: Download Data 1
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: artifact-test1
          path: build/artifacts/test1

      - name: Download Data 2
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: artifact-test2
          path: build/artifacts/test2

      - name: Download Data 3
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: artifact-test3
          path: build/artifacts/test3

      - name: Compile Unified HTML Report
        run: ./gradlew combinedReport --info

      - name: Convert to Extent Report Dashboard
        if: always()
        run: ./gradlew generateExtentReport --info

      - name: Upload Single Consolidated Report
        uses: actions/upload-artifact@v4
        with:
          name: single-consolidated-report
          path: |
            build/reports/combined-report/
            build/reports/extent-dashboard.html

      - name: Check test status for pipeline result
        if: |
          needs.test1.result == 'failure' || 
          needs.test2.result == 'failure' || 
          needs.test3.result == 'failure' ||
          needs.test1.result == 'cancelled' || 
          needs.test2.result == 'cancelled' || 
          needs.test3.result == 'cancelled'
        run: exit 1
