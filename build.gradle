plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // ── Core utilities ────────────────────────────────────────────────────────
    implementation 'org.apache.commons:commons-text:1.12.0'

    // ── Selenium ──────────────────────────────────────────────────────────────
    implementation 'org.seleniumhq.selenium:selenium-java:4.44.0'

    // ── REST Assured ──────────────────────────────────────────────────────────
    implementation 'io.rest-assured:rest-assured:5.5.0'

    // ── JSON parsing ──────────────────────────────────────────────────────────
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'

    // ── Logging ───────────────────────────────────────────────────────────────
    implementation 'org.apache.logging.log4j:log4j-api:2.23.1'
    implementation 'org.apache.logging.log4j:log4j-core:2.23.1'

    // ── Reporting ─────────────────────────────────────────────────────────────
    implementation 'com.aventstack:extentreports:5.1.1'

    // ── JUnit 5 (Jupiter) ─────────────────────────────────────────────────────
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.10.2'
    testRuntimeOnly  'org.junit.jupiter:junit-jupiter-engine:5.10.2'
    testRuntimeOnly  'org.junit.platform:junit-platform-launcher'

    // ── TestNG ────────────────────────────────────────────────────────────────
    testImplementation 'org.testng:testng:7.10.2'
}

// 1. The Default Test Task Configuration
test {
    useJUnitPlatform {
        // Dynamic fallback: lets you run standard './gradlew test -Dtags=smoke'
        String tags = System.getProperty('tags')
        if (tags) includeTags tags
    }

    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
}

// 2. Custom Dedicated Tasks (Must be written outside the 'test' block)

// Task for your JUnit 5 tagged tests
tasks.register("specificJunitTest", Test) {
    group = 'verification' // Organizes it in your Gradle tasks list
    description = 'Runs specific JUnit 5 tests tagged with Specific_Test'

    useJUnitPlatform {
        includeTags "specificJunitTest"
    }
    
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
    
    outputs.upToDateWhen { false } // Forces execution every time
}

// Task for your TestNG grouped tests
tasks.register("specificTestNGTest", Test) {
    group = 'verification'
    description = 'Runs specific TestNG tests grouped with Specific_Test'

    useTestNG() {
        includeGroups "specificTestNGTest"
    }

    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
    
    outputs.upToDateWhen { false }
}
    
    