plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // ── Core utilities ────────────────────────────────────────────────────────
    implementation 'org.apache.commons:commons-text:1.12.0'

    // ── Selenium ──────────────────────────────────────────────────────────────
    implementation 'org.seleniumhq.selenium:selenium-java:4.44.0'

    // ── REST Assured ──────────────────────────────────────────────────────────
    implementation 'io.rest-assured:rest-assured:5.5.0'

    // ── JSON parsing ──────────────────────────────────────────────────────────
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'

    // ── Logging ───────────────────────────────────────────────────────────────
    implementation 'org.apache.logging.log4j:log4j-api:2.23.1'
    implementation 'org.apache.logging.log4j:log4j-core:2.23.1'

    // ── Reporting ─────────────────────────────────────────────────────────────
    implementation 'com.aventstack:extentreports:5.1.1'

    // ── JUnit 5 (Jupiter) ─────────────────────────────────────────────────────
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.10.2'
    testRuntimeOnly  'org.junit.jupiter:junit-jupiter-engine:5.10.2'
    testRuntimeOnly  'org.junit.platform:junit-platform-launcher'

    // ── TestNG ────────────────────────────────────────────────────────────────
    testImplementation 'org.testng:testng:7.10.2'
}

// Case 1: Default Task Configuration (Runs ALL JUnit 5 tests)
test {
    ignoreFailures = true
    useJUnitPlatform {
        String tags = System.getProperty('tags')
        if (tags) includeTags tags
    }

    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
}

// Case 2: Dedicated Task for JUnit 5 Tagged Tests
tasks.register("runSpecificJunit", Test) {
    group = 'verification'
    description = 'Runs JUnit 5 tests tagged with specificJunitTest'
    ignoreFailures = true

    useJUnitPlatform {
        includeTags "specificJunitTest" 
    }
    
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
    
    outputs.upToDateWhen { false }
}

// Case 3: Dedicated Task for TestNG Grouped Tests
tasks.register("runSpecificTestNG", Test) {
    group = 'verification'
    description = 'Runs TestNG tests grouped with specificTestNGTest'
    ignoreFailures = true

    useTestNG() {
        includeGroups "specificTestNGTest" 
    }

    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
    
    outputs.upToDateWhen { false }
    
}

// 4. Master Task to combine all test data into one report (With Lazy Evaluation Guardrails)
tasks.register("combinedReport", TestReport) {
    group = 'verification'
    description = 'Combines test results from all parallel CI jobs into a single HTML report'
    
    destinationDirectory = file("build/reports/combined-report")
    
    // This closure runs at EXECUTION time, after GitHub downloads the files!
    testResults.from({
        def targetDirs = [
            file("build/test-results/test"),
            file("build/test-results/runSpecificJunit"),
            file("build/test-results/runSpecificTestNG")
        ]
        return targetDirs.findAll { it.exists() }
    })

    // Prevents Gradle from crashing if no test directories exist at all
    onlyIf {
        def targetDirs = [
            file("build/test-results/test"),
            file("build/test-results/runSpecificJunit"),
            file("build/test-results/runSpecificTestNG")
        ]
        return targetDirs.any { it.exists() }
    }
}
