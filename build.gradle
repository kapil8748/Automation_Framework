plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // ── Core utilities ────────────────────────────────────────────────────────
    implementation 'org.apache.commons:commons-text:1.12.0'

    // ── Selenium ──────────────────────────────────────────────────────────────
    implementation 'org.seleniumhq.selenium:selenium-java:4.44.0'

    // ── REST Assured ──────────────────────────────────────────────────────────
    implementation 'io.rest-assured:rest-assured:5.5.0'

    // ── JSON parsing ──────────────────────────────────────────────────────────
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'

    // ── Logging ───────────────────────────────────────────────────────────────
    implementation 'org.apache.logging.log4j:log4j-api:2.23.1'
    implementation 'org.apache.logging.log4j:log4j-core:2.23.1'

    // ── Reporting ─────────────────────────────────────────────────────────────
    implementation 'com.aventstack:extentreports:5.1.1'

    // ── JUnit 5 (Jupiter) ─────────────────────────────────────────────────────
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.10.2'
    testRuntimeOnly  'org.junit.jupiter:junit-jupiter-engine:5.10.2'
    testRuntimeOnly  'org.junit.platform:junit-platform-launcher'

    // ── TestNG ────────────────────────────────────────────────────────────────
    testImplementation 'org.testng:testng:7.10.2'
}

// 1. Default Task Configuration (Defaults to running ALL JUnit 5 tests)
test {
    useJUnitPlatform {
        String tags = System.getProperty('tags')
        if (tags) includeTags tags
    }

    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
}

// 2. Dedicated Task for JUnit 5 Tagged Tests
tasks.register("runSpecificJunit", Test) {
    group = 'verification'
    description = 'Runs JUnit 5 tests tagged with specificJunitTest'

    useJUnitPlatform {
        includeTags "specificJunitTest" // Match your Java source code annotation exactly
    }
    
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
    
    outputs.upToDateWhen { false }
}

// 3. Dedicated Task for TestNG Grouped Tests
tasks.register("runSpecificTestNG", Test) {
    group = 'verification'
    description = 'Runs TestNG tests grouped with specificTestNGTest'

    useTestNG() {
        includeGroups "specificTestNGTest" // Match your TestNG @Test(groups = "...") exactly
    }

    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
    
    outputs.upToDateWhen { false }
}

    