// 1. Default Task Configuration (Defaults to running ALL JUnit 5 tests)
test {
    useJUnitPlatform {
        String tags = System.getProperty('tags')
        if (tags) includeTags tags
    }

    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
}

// 2. Dedicated Task for JUnit 5 Tagged Tests
tasks.register("runSpecificJunit", Test) {
    group = 'verification'
    description = 'Runs JUnit 5 tests tagged with specificJunitTest'

    useJUnitPlatform {
        includeTags "specificJunitTest" 
    }
    
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
    
    outputs.upToDateWhen { false }
}

// 3. Dedicated Task for TestNG Grouped Tests
tasks.register("runSpecificTestNG", Test) {
    group = 'verification'
    description = 'Runs TestNG tests grouped with specificTestNGTest'

    useTestNG() {
        includeGroups "specificTestNGTest" 
    }

    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
    
    outputs.upToDateWhen { false }
}

// 4. Cleaned Task: SpecificTestNGTest (Now targets TestNG Groups)
tasks.register("SpecificTestNGTest", Test) {
    group = 'verification'
    description = 'Runs specific TestNG groups requested by CI'

    useTestNG() {
        includeGroups "SpecificTestNGTest" // Filters by @Test(groups = "SpecificTestNGTest")
    }

    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
    
    outputs.upToDateWhen { false }
}

// 5. Cleaned Task: SpecificJUnitTest (Fixed typo & set to use JUnit 5 Platform)
tasks.register("SpecificJUnitTest", Test) {
    group = 'verification'
    description = 'Runs specific JUnit 5 tests tagged with SpecificJUnitTest'

    useJUnitPlatform() {
        includeTags "SpecificJUnitTest" // Filters by @Tag("SpecificJUnitTest")
    }

