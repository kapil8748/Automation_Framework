plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.apache.commons:commons-text:1.12.0'
    implementation 'org.seleniumhq.selenium:selenium-java:4.44.0'
    implementation 'io.rest-assured:rest-assured:5.5.0'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'
    implementation 'org.apache.logging.log4j:log4j-api:2.23.1'
    implementation 'org.apache.logging.log4j:log4j-core:2.23.1'
    implementation 'com.aventstack:extentreports:5.1.1'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.10.2'
    testRuntimeOnly  'org.junit.jupiter:junit-jupiter-engine:5.10.2'
    testRuntimeOnly  'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.testng:testng:7.10.2'
}

// Case 1: Default JUnit 5 tests
test {
    ignoreFailures = true
    useJUnitPlatform()
    reports.html.outputLocation = file("${buildDir}/reports/tests/test")
    reports.junitXml.outputLocation = file("${buildDir}/test-results/test")
}

// Case 2: JUnit tagged tests
tasks.register("runSpecificJunitTest", Test) {
    ignoreFailures = true
    useJUnitPlatform { includeTags "specificJunitTest" }
    binaryResultsDirectory = file("${buildDir}/test-results/runSpecificJunitTest/binary")
    reports.html.outputLocation = file("${buildDir}/reports/tests/runSpecificJunitTest")
    reports.junitXml.outputLocation = file("${buildDir}/test-results/runSpecificJunitTest")
    outputs.upToDateWhen { false }
}

// Case 3: TestNG grouped tests
tasks.register("runSpecificTestNGTest", Test) {
    ignoreFailures = true
    useTestNG { includeGroups "specificTestNGTest" }
    binaryResultsDirectory = file("${buildDir}/test-results/runSpecificTestNGTest/binary")
    reports.html.outputLocation = file("${buildDir}/reports/tests/runSpecificTestNGTest")
    reports.junitXml.outputLocation = file("${buildDir}/test-results/runSpecificTestNGTest")
    outputs.upToDateWhen { false }
}

// Combined report task
tasks.register("combinedReport", TestReport) {
    destinationDirectory = file("build/reports/combined-report")

    testResults.from({
        def targetDirs = [
            file("build/artifacts/test1"),
            file("build/artifacts/test2"),
            file("build/artifacts/test3")
        ]
        targetDirs.findAll { it.exists() }
    })

    onlyIf {
        def targetDirs = [
            file("build/artifacts/test1"),
            file("build/artifacts/test2"),
            file("build/artifacts/test3")
        ]
        targetDirs.any { it.exists() }
    }
}
